<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8"><title>Quiz geograficzny – Ameryka</title><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/><style>body{font-family:Arial;background:#eef3f7;}#container{max-width:900px;margin:30px auto;background:white;padding:20px;border-radius:10px;box-shadow:0 4px 14px rgba(0,0,0,0.2);}#map{height:520px;border-radius:8px;margin-bottom:10px;}#question{font-size:22px;margin-bottom:10px;}#score{font-weight:bold;margin-bottom:10px;}#next{display:none;padding:8px 16px;font-size:16px;}</style></head><body><div id="container"><div id="score"></div><div id="question"></div><div id="map"></div><button id="next">Następne</button></div><script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><script>const features=[{name:"Nizina Amazonki",lat:-5,lng:-60},{name:"Nizina La Platy",lat:-30,lng:-60},{name:"Wielkie Równiny",lat:45,lng:-100},{name:"Wyżyna Brazylijska",lat:-15,lng:-50},{name:"Kordyliery",lat:40,lng:-120},{name:"Andy",lat:-20,lng:-70},{name:"Ocean Atlantycki",lat:10,lng:-35},{name:"Ocean Spokojny",lat:0,lng:-110},{name:"Zatoka Meksykańska",lat:25,lng:-90},{name:"Kanał Panamski",lat:9,lng:-79.6},{name:"rzeka Amazonka",lat:-3,lng:-60},{name:"rzeka Missisipi",lat:35,lng:-90},{name:"Wielkie Jeziora Amerykańskie",lat:45,lng:-84},{name:"jezioro Titicaca",lat:-15.8,lng:-69.4},{name:"jezioro Maracaibo",lat:9.8,lng:-71.6}];let quiz=[...features];shuffle(quiz);let current=0;let score=0;let answered=false;let map;let markers=[];function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}function initMap(){map=L.map('map').setView([15,-75],3);L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{attribution:'©OpenTopoMap'}).addTo(map);createMarkers();}function createMarkers(){features.forEach((f,index)=>{let marker=L.circleMarker([f.lat,f.lng],{radius:8,color:"#333",fillColor:"#333",fillOpacity:0.9}).addTo(map);marker.on("click",()=>markerClick(index,marker));markers.push(marker);});}function markerClick(index,marker){if(answered)return;answered=true;let correctName=quiz[current].name;if(features[index].name===correctName){marker.setStyle({color:"green",fillColor:"green"});score++;document.getElementById("question").innerHTML+=" ✔️";}else{marker.setStyle({color:"red",fillColor:"red"});document.getElementById("question").innerHTML+=" ❌";}document.getElementById("next").style.display="inline";}function showQuestion(){document.getElementById("score").textContent="Wynik: "+score+" / "+quiz.length;if(current<quiz.length){document.getElementById("question").textContent="Wskaż: "+quiz[current].name;answered=false;markers.forEach(m=>{m.setStyle({color:"#333",fillColor:"#333"});});}else{document.getElementById("question").textContent="Koniec quizu";}}document.getElementById("next").onclick=function(){current++;document.getElementById("next").style.display="none";showQuestion();};initMap();showQuestion();</script></body></html>
